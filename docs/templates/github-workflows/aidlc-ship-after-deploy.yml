# AIDLC Projects v2 queue workflow (template)
#
# Copy to YOUR APPLICATION REPO as:
#   .github/workflows/aidlc-ship-after-deploy.yml
#
# CONFIGURE: `on.workflow_run.workflows` names must match your deploy/smoke workflow
# **display names** exactly. Optional repo variable AIDLC_DEPLOY_WORKFLOW_FILE sets the
# workflow file id used to correlate deploy runs (default: deploy-staging.yml).
#
# Setup: docs/GITHUB-AIDLC-QUEUE.md
#
# Dispatches Validate (/ship) after deploy CI for the merged PR whose merge commit
# matches the deploy SHA. aidlc-pr-merged.yml defers Ship until this runs.

name: AIDLC — Ship after deploy CI

on:
  workflow_run:
    workflows: ["Deploy to Staging", "UI smoke (staging)"]
    types: [completed]
    branches: [main]

concurrency:
  group: aidlc-ship-after-deploy-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: write

jobs:
  dispatch-ship:
    runs-on: ubuntu-latest
    if: >-
      (github.event.workflow_run.name == 'Deploy to Staging' &&
        (github.event.workflow_run.conclusion == 'failure' ||
          github.event.workflow_run.conclusion == 'timed_out' ||
          github.event.workflow_run.conclusion == 'cancelled')) ||
      (github.event.workflow_run.name == 'UI smoke (staging)' &&
        github.event.workflow_run.conclusion != 'skipped')
    steps:
      - uses: actions/github-script@v7
        env:
          TRIGGER_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          AIDLC_DEPLOY_WORKFLOW_NAME: ${{ vars.AIDLC_DEPLOY_WORKFLOW_NAME }}
          AIDLC_SMOKE_WORKFLOW_NAME: ${{ vars.AIDLC_SMOKE_WORKFLOW_NAME }}
          AIDLC_DEPLOY_WORKFLOW_FILE: ${{ vars.AIDLC_DEPLOY_WORKFLOW_FILE }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const OWNER = context.repo.owner;
            const REPO = context.repo.repo;
            const triggerName = process.env.TRIGGER_WORKFLOW_NAME || '';
            const triggerConclusion = process.env.TRIGGER_CONCLUSION || '';
            const DEPLOY_NAME =
              (process.env.AIDLC_DEPLOY_WORKFLOW_NAME || 'Deploy to Staging').trim();
            const SMOKE_NAME =
              (process.env.AIDLC_SMOKE_WORKFLOW_NAME || 'UI smoke (staging)').trim();
            const DEPLOY_FILE =
              (process.env.AIDLC_DEPLOY_WORKFLOW_FILE || 'deploy-staging.yml').trim();

            if (triggerName === DEPLOY_NAME && triggerConclusion === 'success') {
              core.info(`Deploy succeeded — waiting for ${SMOKE_NAME} before Ship.`);
              return;
            }

            let deployHeadSha = context.payload.workflow_run.head_sha || '';
            let deployRunUrl = '';
            let smokeRunUrl = '';
            let shipCiStatus = 'success';

            if (triggerName === DEPLOY_NAME) {
              shipCiStatus = 'failed_deploy';
              deployRunUrl = context.payload.workflow_run.html_url || '';
            } else if (triggerName === SMOKE_NAME) {
              const smokeRun = context.payload.workflow_run;
              smokeRunUrl = smokeRun.html_url || '';
              if (triggerConclusion !== 'success') {
                shipCiStatus = 'failed_smoke';
              }
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: OWNER,
                repo: REPO,
                workflow_id: DEPLOY_FILE,
                branch: 'main',
                per_page: 30,
              });
              const allDeployRuns = runs.workflow_runs || [];
              let deployRun = null;
              // Smoke is triggered by a successful deploy but checks out `main`, so this run's
              // head_sha can be ahead of the deploy commit; correlate by time to the deploy run.
              if (smokeRun.event === 'workflow_run') {
                const smokeStartMs = new Date(
                  smokeRun.run_started_at || smokeRun.created_at || 0,
                ).getTime();
                const skewAllowanceMs = 120_000;
                const candidates = allDeployRuns.filter(
                  (r) => r.name === DEPLOY_NAME && r.conclusion === 'success',
                );
                candidates.sort(
                  (a, b) =>
                    new Date(b.updated_at).getTime() -
                    new Date(a.updated_at).getTime(),
                );
                const threshold = smokeStartMs + skewAllowanceMs;
                const eligible = candidates.filter(
                  (r) => new Date(r.updated_at).getTime() <= threshold,
                );
                deployRun = eligible[0] ?? candidates[0] ?? null;
                deployHeadSha = deployRun?.head_sha || '';
              } else {
                deployHeadSha = smokeRun.head_sha || deployHeadSha;
                deployRun =
                  allDeployRuns.find(
                    (r) =>
                      r.head_sha === deployHeadSha && r.name === DEPLOY_NAME,
                  ) ?? null;
              }
              if (deployRun) deployRunUrl = deployRun.html_url || '';
            } else {
              core.info(`Unhandled workflow_run: ${triggerName}`);
              return;
            }

            if (!deployHeadSha) {
              core.setFailed('Missing deploy head SHA from workflow_run.');
              return;
            }

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: OWNER,
              repo: REPO,
              commit_sha: deployHeadSha,
            });

            const merged = (prs || []).filter(
              (p) => p.merged_at && p.merge_commit_sha === deployHeadSha,
            );

            if (!merged.length) {
              core.info(
                `No merged PR for commit ${deployHeadSha.slice(0, 7)} — nothing to Ship.`,
              );
              return;
            }

            const refBranch = context.payload.repository?.default_branch || 'main';

            /** Only explicit tracking links — bare #517 in prose often references another PR. */
            function issueNumberFromPr(pull) {
              const text = `${pull.title || ''}\n${pull.body || ''}`;
              const patterns = [
                /\b(?:closes|fixes|resolves)\s+#(\d+)/i,
                /\brelates\s+to\s+#(\d+)/i,
              ];
              for (const re of patterns) {
                const m = text.match(re);
                if (m) return parseInt(m[1], 10);
              }
              return null;
            }

            for (const pull of merged) {
              const issueNum = issueNumberFromPr(pull);
              if (!issueNum) {
                core.warning(`PR #${pull.number} has no issue reference — skip Ship.`);
                continue;
              }

              const { data: issueData } = await github.rest.issues.get({
                owner: OWNER,
                repo: REPO,
                issue_number: issueNum,
              });
              if (issueData.pull_request) {
                core.warning(
                  `#${issueNum} is a pull request, not a tracking issue — skip Ship.`,
                );
                continue;
              }
              const labels = new Set((issueData.labels ?? []).map((l) => l.name));
              if (labels.has('aidlc_work:in_progress')) {
                core.warning(`Skip Ship for #${issueNum} — aidlc_work:in_progress.`);
                continue;
              }

              const shipPr = {
                number: pull.number,
                merge_sha: pull.merge_commit_sha,
                merged_at: pull.merged_at,
                html_url: pull.html_url,
                title: pull.title || '',
              };

              core.info(
                `Dispatch Ship for issue #${issueNum}, PR #${pull.number} @ ${deployHeadSha.slice(0, 7)} (${shipCiStatus})`,
              );

              await github.rest.actions.createWorkflowDispatch({
                owner: OWNER,
                repo: REPO,
                workflow_id: 'aidlc-launch-from-board.yml',
                ref: refBranch,
                inputs: {
                  issue_number: String(issueNum),
                  ship_prs_json: JSON.stringify([shipPr]),
                  ship_deploy_sha: deployHeadSha,
                  ship_deploy_run_url: deployRunUrl,
                  ship_smoke_run_url: smokeRunUrl,
                  ship_ci_status: shipCiStatus,
                },
              });

              await github.rest.issues.createComment({
                owner: OWNER,
                repo: REPO,
                issue_number: issueNum,
                body: [
                  '[aidlc-ship-after-deploy]',
                  `Staging CI **${shipCiStatus}** for \`${deployHeadSha.slice(0, 7)}\` — PR #${pull.number}.`,
                  deployRunUrl ? `Deploy: ${deployRunUrl}` : '',
                  smokeRunUrl ? `Smoke: ${smokeRunUrl}` : '',
                  '',
                  'Launching Cursor Ship agent…',
                ]
                  .filter(Boolean)
                  .join('\n'),
              });
            }
